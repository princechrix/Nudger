<!DOCTYPE html>
<html lang="en">
<head>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Nudger</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

      <h1 class="hero__title">Nudger</h1>

  <script src="app.js"></script>
