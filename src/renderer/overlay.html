<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Nudge</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --text-dim: #666;
      --accent: #ff4d00;
      --font: 'Segoe UI', -apple-system, system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
      cursor: default;
    }

    .overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 32px;
      animation: fadeIn 0.3s ease;
    }

    .overlay__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .overlay__message {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      max-width: 600px;
      line-height: 1.3;
      padding: 0 40px;
    }

    .overlay__session {
      font-size: 13px;
      color: var(--text-dim);
    }

    .overlay__dismiss {
      margin-top: 16px;
      padding: 14px 48px;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
      opacity: 0;
      pointer-events: none;
    }

    .overlay__dismiss.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay__dismiss.active:hover {
      background: var(--accent);
      color: #fff;
    }

    .overlay__countdown {
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      height: 18px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <span class="overlay__label">Nudge</span>
    <p class="overlay__message" id="message"></p>
    <span class="overlay__session" id="session-name"></span>
    <span class="overlay__countdown" id="countdown"></span>
    <button class="overlay__dismiss" id="btn-dismiss">I'm on it</button>
  </div>
  <script src="overlayApp.js"></script>
</body>
</html>
