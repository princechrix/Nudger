<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Nudge</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #e8e8e8;
      --text-dim: #666;
      --text-muted: #444;
      --accent: #ff4d00;
      --accent-glow: rgba(255, 77, 0, 0.08);
      --danger: #e81123;
      --font: 'Segoe UI', -apple-system, system-ui, sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
      cursor: default;
    }

    .overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
      animation: fadeIn 0.3s ease;
    }

    .overlay__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .overlay__message {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      max-width: 600px;
      line-height: 1.3;
      padding: 0 40px;
    }

    .overlay__session {
      font-size: 13px;
      color: var(--text-dim);
    }

    .overlay__countdown {
      font-size: 12px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      height: 18px;
    }

    .overlay__ack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay__ack.active {
      opacity: 1;
      pointer-events: auto;
    }

    .overlay__ack-hint {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .overlay__type-input {
      width: 200px;
      padding: 10px 14px;
      background: transparent;
      border: 2px solid var(--text-muted);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .overlay__type-input::placeholder {
      color: var(--text-muted);
      letter-spacing: 4px;
      font-size: 14px;
    }

    .overlay__type-input:focus {
      border-color: var(--accent);
    }

    .overlay__type-input.error {
      border-color: var(--danger);
      animation: shake 0.3s ease;
    }

    .overlay__type-input.success {
      border-color: var(--accent);
    }

    .overlay__dismiss {
      padding: 14px 48px;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .overlay__dismiss:hover {
      background: var(--accent);
      color: #fff;
    }

    .overlay__or {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .credit {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <span class="overlay__label">Nudge</span>
    <p class="overlay__message" id="message"></p>
    <span class="overlay__session" id="session-name"></span>
    <span class="overlay__countdown" id="countdown"></span>

    <div class="overlay__ack" id="ack-area">
      <span class="overlay__ack-hint">Type <strong>DONE</strong> to dismiss</span>
      <input class="overlay__type-input" id="type-input" type="text" placeholder="DONE" maxlength="4" autocomplete="off" spellcheck="false">
      <span class="overlay__or">or</span>
      <button class="overlay__dismiss" id="btn-dismiss">I'm on it</button>
    </div>
  </div>
  <footer class="credit">Developed by Prince Chrix</footer>

  <script src="overlayApp.js"></script>
</body>
</html>
